name: Publish to Docker Hub

# Builds and pushes the image when a version tag is pushed, e.g.:
#   git tag v0.9.0 && git push origin v0.9.0
# Requires the repository secret DOCKERHUB_TOKEN (Docker Hub access token).
# Pushes to docker.io/vaatu/cas-genesis-world-mcp — update the namespace
# below (both occurrences) if the Docker Hub account is ever renamed.

on:
  push:
    tags: ["v*"]

env:
  IMAGE: vaatu/cas-genesis-world-mcp

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Derive version from tag
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          username: vaatu
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.version.outputs.value }}
            ${{ env.IMAGE }}:latest
