name: Publish to npm

# Publishes when a version tag is pushed, e.g.:
#   git tag v0.9.0 && git push origin v0.9.0
# Requires the repository secret NPM_TOKEN (npm automation token).

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm test
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
